<style>
/* ========= ULTIMATE TRANSCENDENCE ========= */

.projects-page .page-content,
.blog-page .page-content{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  margin-top:-60px;
  text-align:center;
}

/* Gradient animated titles */
.page-title{
  font-family:'Space Grotesk',sans-serif;
  font-size:clamp(34px,8vw,54px);
  background:linear-gradient(90deg,#c4a0a8,#8b6b73,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:titleGlow 6s ease-in-out infinite;
}

@keyframes titleGlow{
  0%,100%{text-shadow:0 0 15px rgba(196,160,168,.4)}
  50%{text-shadow:0 0 40px rgba(196,160,168,1)}
}

/* Glass cards */
.content-list{
  max-width:650px;
  width:100%;
  margin-top:40px;
}

.content-item{
  position:relative;
  padding:24px;
  margin-bottom:20px;
  border-radius:22px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(196,160,168,.2);
  backdrop-filter:blur(20px);
  transition:.6s cubic-bezier(.16,1,.3,1);
  overflow:hidden;
  transform-style:preserve-3d;
}

/* Glow */
.content-item::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent,rgba(196,160,168,.25),transparent);
  opacity:0;
  transition:.6s;
}

.content-item:hover::before{opacity:1}

.content-item:hover{
  transform:translateY(-8px) scale(1.05);
  box-shadow:
    0 0 40px rgba(196,160,168,.7),
    0 0 80px rgba(196,160,168,.3);
}

/* Floating text */
.content-item-title{
  animation:floatText 4s ease-in-out infinite;
}

@keyframes floatText{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* Sparkles */
.sparkle{
  position:absolute;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
  pointer-events:none;
  animation:spark 1s forwards;
}

@keyframes spark{
  from{opacity:1;transform:scale(1)}
  to{opacity:0;transform:translate(var(--x),var(--y)) scale(0)}
}

/* Scroll reveal */
.reveal{
  opacity:0;
  transform:translateY(30px);
  transition:1s ease;
}

.reveal.active{
  opacity:1;
  transform:translateY(0);
}
</style>

<script>
/* ========= ULTIMATE TRANSCENDENCE JS ========= */

/* 3D tilt + sparkles */
document.querySelectorAll('.content-item').forEach(card=>{
  card.classList.add('reveal');

  card.addEventListener('mousemove',e=>{
    const r=card.getBoundingClientRect();
    const x=e.clientX-r.left;
    const y=e.clientY-r.top;
    const rx=(y/r.height-.5)*-14;
    const ry=(x/r.width-.5)*14;
    card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg) scale(1.05)`;
  });

  card.addEventListener('mouseleave',()=>{
    card.style.transform="rotateX(0) rotateY(0) scale(1)";
  });

  card.addEventListener('mouseenter',()=>{
    for(let i=0;i<15;i++){
      const s=document.createElement('span');
      s.className='sparkle';
      s.style.left=Math.random()*100+'%';
      s.style.top=Math.random()*100+'%';
      s.style.setProperty('--x',(Math.random()*150-75)+'px');
      s.style.setProperty('--y',(Math.random()*150-75)+'px');
      card.appendChild(s);
      setTimeout(()=>s.remove(),1000);
    }
  });
});

/* Scroll reveal */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('active');
    }
  });
},{threshold:0.2});

document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));

/* Typing effect for blog titles */
document.querySelectorAll('.blog-page .content-item-title').forEach(title=>{
  const text=title.innerText;
  title.innerText='';
  let i=0;
  const t=setInterval(()=>{
    title.innerText+=text[i];
    i++;
    if(i>=text.length)clearInterval(t);
  },40);
});
</script>
