<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marco Haruni</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    :root {
      --bg: #f5f7fb;           /* soft research-light */
      --fg: #0f172a;           /* deep slate */
      --muted: #475569;        /* calm gray */
      --accent: #2563eb;       /* lab blue */
      --accent-soft: #e0e7ff;  /* hover glow */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(180deg, #ffffff, var(--bg));
      color: var(--fg);
      line-height: 1.7;
      animation: fadeIn 0.8s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    a { color: inherit; text-decoration: none; }

    /* Top bar */
    header {
      display: flex;
      justify-content: center;
      gap: 22px;
      padding: 28px 16px;
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      z-index: 10;
    }

    header a {
      font-size: 18px;
      color: var(--muted);
      transition: all 0.25s ease;
    }

    header a:hover {
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* Main */
    main {
      max-width: 720px;
      margin: 90px auto;
      padding: 0 20px;
      text-align: center;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 22px;
      border: 2px solid var(--accent-soft);
      transition: transform 0.3s ease;
    }

    .avatar:hover {
      transform: scale(1.05);
    }

    h1 {
      font-size: 30px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    p {
      color: var(--muted);
      font-size: 16px;
    }

    .about {
      margin-top: 8px;
    }

    .cta {
      margin-top: 64px;
      font-size: 16px;
      font-family: 'JetBrains Mono', monospace;
    }

    .cta a {
      color: var(--accent);
      padding: 6px 10px;
      border-radius: 6px;
      background: transparent;
      transition: background 0.25s ease;
    }

    .cta a:hover {
      background: var(--accent-soft);
    }

    footer {
      margin: 120px 0 40px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>

  <!-- TOP LINKS -->
  <header>
    <a href="https://youtube.com/@marcoharuni" target="_blank" aria-label="YouTube"><i class="fab fa-youtube"></i></a>
    <a href="https://x.com/marcoharuni" target="_blank" aria-label="X"><i class="fab fa-x-twitter"></i></a>
    <a href="https://mpembalab.ai" target="_blank">Mpemba Lab</a>
    <a href="https://github.com/marcoharuni" target="_blank" aria-label="GitHub"><i class="fab fa-github"></i></a>
    <a href="mailto:marcoharuni95@gmail.com" aria-label="Email"><i class="fas fa-envelope"></i></a>
  </header>

  <!-- CONTENT -->
  <main>
    <img src="/assets/images/avatar.jpg" alt="Marco Haruni" class="avatar" />

    <h1>Marco Haruni</h1>

    <p class="about">
      AI systems architect. Founder of <strong>Mpemba Lab</strong> — an independent open AI research lab in Tanzania,
      on a journey to build AGI and serve humanity in Tanzania, Africa, and worldwide.
    </p>

    <div class="cta">
      Try our model → <a href="https://kinara.ai" target="_blank">kinara.ai</a>
    </div>
  </main>

  <footer>
    © <span id="year"></span> Marco Haruni
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
